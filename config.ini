[blower]
blower_update_interval = 0.05
blower_default_setpoint = 4.4
blower_use_flow_pv = 1

[cpc]
use_serial_cpc = 1
cpc_serial_port = /dev/serial0
; CPC_TYPE: TSI3010 or TSI3772 (sets serial params and baud automatically)
cpc_type = TSI3772
; CPC_SERIAL_BAUD: optional override; if omitted, uses device default (TSI3010=9600, TSI3772=115200)
; cpc_serial_baud = 9600
cpc_sample_interval = 1.0

[hv]
use_serial_hv = 1
hv_serial_port = /dev/ttyAMA2
hv_serial_baud = 9600
hv_update_interval = 0.05

[flowmeter]
use_serial_massflow = 0
use_i2c_flowmeter = true
flowmeter_i2c_bus = 1
flowmeter_i2c_address = 0x40
flowmeter_scale_factor = 140.0
flowmeter_offset = 32000.0

[pressure]
use_i2c_pressure = true
pressure_i2c_bus = 1
pressure_i2c_address = 0x25
aerosol_flow_calibration = 0.15228426395939088

[ui]
debug_mode = 1
plot_max_seconds = 60.0

[dma]
dma_length = 0.11
dma_inner_radius = 0.025
dma_outer_radius = 0.033
dma_sheath_flow = 4.4
dma_aerosol_flow = 1.0
default_temperature = 293.15
default_pressure = 101325

[measurement]
voltage_min = 1050
voltage_max = 1250
steps = 10
settling = 5
measurement_time = 10
repetitions = 1
save = true
save_path =
